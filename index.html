<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>週6筋トレ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#111;--card:#161616;--border:#222;--text:#f0f0f0;--muted:#555;--day-color:#e85d04;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans JP",sans-serif;font-weight:300;display:flex;flex-direction:column;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
/* NAV */
.bottom-nav{display:flex;background:#0d0d0d;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;cursor:pointer;color:var(--muted);font-size:10px;letter-spacing:1px;transition:color .2s;}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;}
.nav-item.active{color:var(--day-color);}
/* HOME */
.home-header{padding:20px 20px 0;}
.home-date{font-size:11px;letter-spacing:2px;color:var(--muted);}
.home-greeting{font-family:"Bebas Neue",sans-serif;font-size:36px;letter-spacing:1px;margin-top:4px;}
.selector-label{font-size:9px;letter-spacing:3px;color:var(--muted);margin:14px 20px 8px;}
.day-selector{display:flex;gap:6px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none;}
.day-selector::-webkit-scrollbar{display:none;}
.day-sel-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:"Noto Sans JP",sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;color:var(--muted);}
.today-card{margin:12px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative;}
.today-card-accent{position:absolute;top:0;left:0;right:0;height:3px;background:var(--day-color);}
.today-card-inner{padding:20px;}
.today-label{font-size:10px;letter-spacing:3px;color:var(--muted);}
.today-day-en{font-family:"Bebas Neue",sans-serif;font-size:48px;line-height:1;color:var(--day-color);margin:4px 0;}
.today-part{font-size:22px;font-weight:700;}
.today-sub{font-size:12px;color:var(--muted);margin-top:6px;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin:16px 0 6px;}
.progress-bg{background:var(--border);border-radius:4px;height:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--day-color);border-radius:4px;transition:width .4s;}
.start-btn{display:block;width:100%;margin-top:16px;padding:14px;background:var(--day-color);color:#000;font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;border:none;border-radius:8px;cursor:pointer;}
.rest-card{margin:12px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px 20px;text-align:center;}
.streak-row{display:flex;gap:10px;margin:12px 20px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;align-items:center;}
.streak-num{font-family:"Bebas Neue",sans-serif;font-size:32px;line-height:1;color:#ffbe0b;}
.streak-label{font-size:11px;color:var(--muted);letter-spacing:1px;}
/* WEEK CAL */
.week-cal{margin:0 20px 20px;}
.week-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.week-cal-title{font-size:10px;letter-spacing:2px;color:var(--muted);flex:1;text-align:center;}
.week-nav-btn{background:none;border:1px solid var(--border);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);}
.week-nav-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.week-nav-btn:disabled{opacity:.2;cursor:default;}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.week-day{display:flex;flex-direction:column;align-items:center;gap:4px;}
.week-day-label{font-size:9px;color:var(--muted);}
.week-dot{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);}
/* WORKOUT */
.workout-header{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;}
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;}
.back-btn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;}
.wh-part{font-size:11px;letter-spacing:2px;color:var(--day-color);}
.wh-title{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:1px;line-height:1;}
.wh-progress{font-size:11px;color:var(--muted);margin-top:2px;}
.ex-list{padding:12px 16px 100px;}
.ex-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--day-color);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.ex-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.ex-badge{width:28px;height:28px;border-radius:50%;background:color-mix(in srgb,var(--day-color) 15%,transparent);color:var(--day-color);font-family:"Bebas Neue",sans-serif;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-info{flex:1;}
.ex-name{font-size:14px;font-weight:700;}
.ex-sets-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.ex-chev{color:var(--muted);transition:transform .25s;font-size:18px;flex-shrink:0;}
.ex-card.open .ex-chev{transform:rotate(45deg);}
.ex-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.ex-card.open .ex-body{max-height:900px;}
.ex-inner{padding:0 16px 16px;border-top:1px solid var(--border);}
.ex-sec{margin-top:12px;}
.ex-sec-title{font-size:9px;letter-spacing:3px;color:var(--day-color);font-weight:700;margin-bottom:8px;}
.ex-how{list-style:none;}
.ex-how li{font-size:12px;line-height:1.8;color:#bbb;padding-left:14px;position:relative;margin-bottom:2px;}
.ex-how li::before{content:"—";position:absolute;left:0;color:var(--day-color);font-size:9px;top:4px;}
.point{background:color-mix(in srgb,var(--day-color) 8%,transparent);border-left:2px solid var(--day-color);padding:7px 10px;font-size:11px;line-height:1.6;color:#bbb;border-radius:0 4px 4px 0;margin-bottom:5px;}
.sets-tracker{margin-top:14px;}
.sets-title{font-size:9px;letter-spacing:3px;color:var(--day-color);font-weight:700;margin-bottom:8px;}
.sets-row{display:flex;gap:8px;flex-wrap:wrap;}
.set-btn{width:44px;height:44px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:"Bebas Neue",sans-serif;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.set-btn.done{background:var(--day-color);border-color:var(--day-color);color:#000;font-size:16px;}
.memo-area{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:"Noto Sans JP",sans-serif;font-size:12px;padding:10px;resize:none;height:64px;margin-top:8px;}
.memo-area::placeholder{color:var(--muted);}
.timer-fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--day-color);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px color-mix(in srgb,var(--day-color) 40%,transparent);z-index:50;}
.timer-fab svg{width:22px;height:22px;stroke:#000;fill:none;stroke-width:2;}
/* TIMER */
.timer-modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;}
.timer-modal.show{display:flex;}
.timer-disp{font-family:"Bebas Neue",sans-serif;font-size:96px;color:var(--day-color);line-height:1;}
.timer-lbl{font-size:12px;letter-spacing:3px;color:var(--muted);margin-bottom:32px;}
.timer-presets{display:flex;gap:8px;margin-top:20px;}
.timer-preset{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;}
.timer-preset.sel{border-color:var(--day-color);color:var(--day-color);}
.timer-btns{display:flex;gap:12px;margin-top:24px;}
.t-btn{padding:12px 28px;border-radius:8px;border:none;font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
.t-btn.primary{background:var(--day-color);color:#000;}
.t-btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
/* FINISH */
.finish-banner{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px;}
.finish-banner.show{display:flex;}
.finish-emoji{font-size:64px;margin-bottom:16px;}
.finish-title{font-family:"Bebas Neue",sans-serif;font-size:48px;color:var(--day-color);letter-spacing:2px;}
.finish-sub{font-size:14px;color:var(--muted);margin-top:8px;margin-bottom:32px;line-height:1.8;}
.finish-btn{padding:14px 40px;background:var(--day-color);color:#000;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;}
/* RECORD */
.rec-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.rec-title{font-family:"Bebas Neue",sans-serif;font-size:32px;letter-spacing:1px;}
.rec-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.rec-list{padding:16px 20px 100px;}
.rec-month{font-size:10px;letter-spacing:2px;color:var(--muted);margin:16px 0 8px;}
.rec-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.rec-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rec-info{flex:1;}
.rec-date{font-size:13px;font-weight:700;}
.rec-memo{font-size:11px;color:var(--muted);margin-top:2px;}
.rec-sets{font-family:"Bebas Neue",sans-serif;font-size:20px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;line-height:1.8;}
/* MENU */
.menu-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.menu-title{font-family:"Bebas Neue",sans-serif;font-size:32px;letter-spacing:1px;}
.menu-body{padding:16px 20px 100px;}
.menu-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;}
.menu-card-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.menu-bar{width:4px;height:40px;border-radius:2px;flex-shrink:0;}
.menu-card-name{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:1px;}
.menu-card-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.menu-chev{color:var(--muted);transition:transform .25s;margin-left:auto;}
.menu-card.open .menu-chev{transform:rotate(180deg);}
.menu-ex-list{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.menu-card.open .menu-ex-list{max-height:3000px;}
.menu-ex{padding:12px 16px;border-top:1px solid var(--border);}
.menu-ex-name{font-size:13px;font-weight:700;}
.menu-ex-sets{font-size:11px;color:var(--muted);margin-top:2px;}
.menu-how{list-style:none;margin-top:8px;}
.menu-how li{font-size:11px;color:#aaa;line-height:1.8;padding-left:12px;position:relative;}
.menu-how li::before{content:"–";position:absolute;left:0;}
.menu-point{padding:6px 10px;font-size:11px;color:#aaa;line-height:1.6;border-radius:0 3px 3px 0;margin-top:4px;border-left:2px solid;}
.ex-gif-wrap{margin-top:14px;border-radius:8px;overflow:hidden;background:#000;text-align:center;max-height:200px;}
.ex-gif{width:100%;max-height:200px;object-fit:contain;display:block;}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="scroll-body">
    <div class="home-header">
      <div class="home-date" id="home-date"></div>
      <div class="home-greeting" id="home-greeting"></div>
    </div>
    <div class="selector-label">曜日を選んでスタート</div>
    <div class="day-selector" id="day-selector"></div>
    <div id="today-section"></div>
    <div class="streak-row">
      <div style="font-size:28px">🔥</div>
      <div style="flex:1">
        <div class="streak-num" id="streak-num">0</div>
        <div class="streak-label">DAY STREAK</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--muted)">今週の完了</div>
        <div id="week-done" style="font-family:'Bebas Neue',sans-serif;font-size:28px">0/6</div>
      </div>
    </div>
    <div class="week-cal">
      <div class="week-cal-header">
        <button class="week-nav-btn" id="btn-prev-week">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="week-cal-title" id="week-title">今週のトレーニング</div>
        <button class="week-nav-btn" id="btn-next-week">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="week-days" id="week-days"></div>
    </div>
  </div>
  <nav class="bottom-nav" id="nav-home">
    <div class="nav-item active" data-screen="home"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>ホーム</div>
    <div class="nav-item" data-screen="record"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>記録</div>
    <div class="nav-item" data-screen="menu"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>メニュー</div>
  </nav>
</div>

<!-- WORKOUT -->
<div class="screen" id="screen-workout">
  <div class="workout-header">
    <button class="back-btn" id="btn-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div>
      <div class="wh-part" id="wh-part"></div>
      <div class="wh-title" id="wh-title"></div>
      <div class="wh-progress" id="wh-progress"></div>
    </div>
  </div>
  <div class="scroll-body ex-list" id="ex-list"></div>
  <button class="timer-fab" id="btn-timer-fab">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 15 16"/><path d="M9 2h6"/></svg>
  </button>
</div>

<!-- RECORD -->
<div class="screen" id="screen-record">
  <div class="rec-header"><div class="rec-title">TRAINING LOG</div><div class="rec-sub">トレーニング記録</div></div>
  <div class="scroll-body rec-list" id="rec-list"></div>
  <nav class="bottom-nav">
    <div class="nav-item" data-screen="home"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>ホーム</div>
    <div class="nav-item active" data-screen="record"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>記録</div>
    <div class="nav-item" data-screen="menu"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>メニュー</div>
  </nav>
</div>

<!-- MENU -->
<div class="screen" id="screen-menu">
  <div class="menu-header"><div class="menu-title">WEEKLY MENU</div></div>
  <div class="scroll-body menu-body" id="menu-body"></div>
  <nav class="bottom-nav">
    <div class="nav-item" data-screen="home"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>ホーム</div>
    <div class="nav-item" data-screen="record"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>記録</div>
    <div class="nav-item active" data-screen="menu"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>メニュー</div>
  </nav>
</div>

<!-- TIMER -->
<div class="timer-modal" id="timer-modal">
  <div class="timer-lbl">REST TIMER</div>
  <div class="timer-disp" id="timer-disp">01:00</div>
  <div class="timer-presets">
    <button class="timer-preset" data-sec="30">30秒</button>
    <button class="timer-preset sel" data-sec="60">60秒</button>
    <button class="timer-preset" data-sec="90">90秒</button>
  </div>
  <div class="timer-btns">
    <button class="t-btn secondary" id="btn-timer-close">閉じる</button>
    <button class="t-btn primary" id="btn-timer-toggle">スタート</button>
  </div>
</div>

<!-- FINISH -->
<div class="finish-banner" id="finish-banner">
  <div class="finish-emoji">💪</div>
  <div class="finish-title">COMPLETE!</div>
  <div class="finish-sub" id="finish-sub"></div>
  <button class="finish-btn" id="btn-finish">ホームへ戻る</button>
</div>

<script>
// ===================== DATA =====================
const DAYS = [
  { name:"胸", eng:"CHEST", color:"#e85d04", exercises:[
    { name:"ダンベルフライ", gif:"https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Fly.gif", sets:3, reps:"10〜12回", rest:60,
      how:["床またはベッドに仰向けになり、ダンベルを両手に持つ","肘を軽く曲げた状態で、腕を横に大きく開いていく","胸がしっかり伸びたところで止め、胸を絞るように腕を閉じて戻す","動作中、肘の角度は変えない（固定したまま）"],
      points:["大胸筋を「伸ばして縮める」動作で徹底的に効かせる種目","5kgは十分な重さ。ゆっくり丁寧に行うことで効果が増す","閉じるときは「胸の前で抱きしめる」イメージで"] },
    { name:"ダンベルプレス（床）", gif:"https://fitnessprogramer.com/wp-content/uploads/2021/04/Dumbbell-Floor-Press.gif", sets:3, reps:"10〜12回", rest:60,
      how:["仰向けに寝て膝を立て、ダンベルを胸の横に構える（肘90度）","息を吐きながら天井に向かってダンベルを押し上げる","頂点でダンベルを軽く近づけ、ゆっくり元の位置に戻す"],
      points:["ベンチプレスの床版。大胸筋・三角筋前部・三頭筋を鍛える","肘が床につく手前で止めると大胸筋への刺激が維持できる","1個しかない場合は片手ずつ交互に行ってもOK"] },

const DOW_JP = ["日","月","火","水","木","金","土"];
const DOW_EN = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const DAY_EN  = ["MON","TUE","WED","THU","FRI","SAT"];
// dayIdx 0-5 = Mon-Sat = dow 1-6
function dowToDi(dw) { return (dw >= 1 && dw <= 6) ? dw - 1 : null; }

// ===================== STATE =====================
let viewDayIdx = 0;
let weekOffset = 0;   // 0 = this week, -1 = last week …
let curDayIdx  = null;
let workoutDate = null;
let setsDone = {};
let memos = {};
let timerSec = 60, timerRemain = 60, timerRunning = false, timerIv = null;

// ===================== STORAGE =====================
function gs(k, d) { try { var v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : d; } catch(e) { return d; } }
function ss(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
function dstr(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function todayStr() { return dstr(new Date()); }
function getRecs() { return gs("wt_recs", []); }
function saveRec(r) {
  var recs = getRecs();
  var i = recs.findIndex(function(x){ return x.date === r.date && x.dayIdx === r.dayIdx; });
  if (i >= 0) recs[i] = r; else recs.unshift(r);
  ss("wt_recs", recs);
}

// ===================== SCREEN =====================
function showScreen(name) {
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  document.getElementById("screen-" + name).classList.add("active");
  if (name === "home")   renderHome();
  if (name === "record") renderRecord();
  if (name === "menu")   renderMenuScreen();
}

// nav clicks
document.querySelectorAll(".nav-item[data-screen]").forEach(function(el) {
  el.addEventListener("click", function() { showScreen(this.dataset.screen); });
});

// ===================== HELPERS =====================
function setDayColor(color) {
  document.documentElement.style.setProperty("--day-color", color);
}

// Date of dayIdx in the offset week
function dateOfDayIdx(di) {
  var now = new Date();
  var sunOfWeek = new Date(now);
  sunOfWeek.setDate(now.getDate() - now.getDay() + weekOffset * 7);
  var d = new Date(sunOfWeek);
  d.setDate(sunOfWeek.getDate() + (di + 1)); // di+1 = dow
  return dstr(d);
}

// ===================== HOME =====================
function renderHome() {
  var now = new Date();
  var dow = now.getDay();
  document.getElementById("home-date").textContent =
    now.getFullYear() + "年" + (now.getMonth()+1) + "月" + now.getDate() + "日（" + DOW_JP[dow] + "）";
  var h = now.getHours();
  document.getElementById("home-greeting").textContent =
    h < 12 ? "おはようございます" : h < 17 ? "こんにちは" : "おつかれさまです";

  var todayDi = dowToDi(dow);
  if (viewDayIdx === null) viewDayIdx = todayDi !== null ? todayDi : 0;

  setDayColor(DAYS[viewDayIdx].color);
  renderDaySelector(todayDi);
  renderTodayCard(viewDayIdx, todayDi);
  renderStreak();
  renderWeekCal();
}

function renderDaySelector(todayDi) {
  var labels = ["月（胸）","火（背中）","水（肩）","木（腕）","金（下半身）","土（腹筋）"];
  var html = "";
  DAYS.forEach(function(day, i) {
    var isToday  = (weekOffset === 0 && i === todayDi);
    var isActive = (i === viewDayIdx);
    var style = "--dc:" + day.color + ";";
    if (isActive) style += "background:" + day.color + ";border-color:" + day.color + ";color:#000;font-weight:700;";
    else if (isToday) style += "border-color:" + day.color + ";color:" + day.color + ";";
    html += "<button class='day-sel-btn' data-di='" + i + "' style='" + style + "'>" + (isToday ? "★ " : "") + labels[i] + "</button>";
  });
  var sel = document.getElementById("day-selector");
  sel.innerHTML = html;
  sel.querySelectorAll(".day-sel-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      viewDayIdx = parseInt(this.dataset.di);
      var todayDi2 = dowToDi(new Date().getDay());
      setDayColor(DAYS[viewDayIdx].color);
      renderDaySelector(weekOffset === 0 ? todayDi2 : null);
      renderTodayCard(viewDayIdx, weekOffset === 0 ? todayDi2 : null);
    });
  });
}

function renderTodayCard(di, todayDi) {
  var day = DAYS[di];
  var targetDate = dateOfDayIdx(di);
  var total = day.exercises.reduce(function(a, e){ return a + e.sets; }, 0);
  var rec   = getRecs().find(function(r){ return r.date === targetDate && r.dayIdx === di; });
  var done  = rec ? rec.setsDone : 0;
  var pct   = total > 0 ? Math.round(done / total * 100) : 0;
  var isToday = (di === todayDi && weekOffset === 0);

  var d = new Date(targetDate + "T00:00:00");
  var topLabel = isToday ? "TODAY'S TRAINING"
    : (d.getMonth()+1) + "月" + d.getDate() + "日（" + DOW_JP[d.getDay()] + "）";

  var btnLabel = (rec && done >= total) ? "✓ 完了済み — 再確認" : (done > 0 ? "▶ 続きから" : "▶ トレーニング開始");
  var isFuture = (new Date(targetDate + "T00:00:00")) > new Date() && !isToday;

  var sec = document.getElementById("today-section");
  sec.innerHTML =
    "<div class='today-card'><div class='today-card-accent'></div><div class='today-card-inner'>" +
    "<div class='today-label'>" + topLabel + "</div>" +
    "<div class='today-day-en'>" + DAY_EN[di] + "</div>" +
    "<div class='today-part'>" + day.name + " <span style='font-weight:300;font-size:16px;color:var(--muted)'>" + day.eng + "</span></div>" +
    "<div class='today-sub'>" + day.exercises.length + "種目 · 約15分</div>" +
    "<div class='progress-label'><span>進捗</span><span>" + done + "/" + total + " セット</span></div>" +
    "<div class='progress-bg'><div class='progress-fill' style='width:" + pct + "%'></div></div>" +
    "<button class='start-btn' id='btn-start'" + (isFuture ? " disabled style='opacity:.5'" : "") + ">" + btnLabel + "</button>" +
    "</div></div>";

  if (!isFuture) {
    document.getElementById("btn-start").addEventListener("click", function() {
      openWorkout(di, targetDate);
    });
  }
}

function renderStreak() {
  var recs = getRecs(), streak = 0;
  var now = new Date();
  for (var i = 0; i < 90; i++) {
    var d = new Date(now); d.setDate(now.getDate() - i);
    var dw = d.getDay(); if (dw === 0) continue;
    var ds = dstr(d), di = dw - 1;
    var total = DAYS[di].exercises.reduce(function(a,e){ return a+e.sets; }, 0);
    var rec = recs.find(function(r){ return r.date === ds && r.dayIdx === di; });
    if (rec && rec.setsDone >= total) streak++;
    else if (i > 0) break;
  }
  document.getElementById("streak-num").textContent = streak;

  var ws = new Date(now); ws.setDate(now.getDate() - now.getDay() + 1);
  var wd = 0;
  for (var j = 0; j < 6; j++) {
    var dd = new Date(ws); dd.setDate(ws.getDate() + j);
    var ds2 = dstr(dd);
    var total2 = DAYS[j].exercises.reduce(function(a,e){ return a+e.sets; }, 0);
    var rec2 = recs.find(function(r){ return r.date === ds2 && r.dayIdx === j; });
    if (rec2 && rec2.setsDone >= total2) wd++;
  }
  document.getElementById("week-done").textContent = wd + "/6";
}

function renderWeekCal() {
  var recs = getRecs(), now = new Date(), td = now.getDay();
  var sunBase = new Date(now); sunBase.setDate(now.getDate() - td + weekOffset * 7);

  // Title
  var titleEl = document.getElementById("week-title");
  if (weekOffset === 0)       titleEl.textContent = "今週のトレーニング";
  else if (weekOffset === -1) titleEl.textContent = "先週のトレーニング";
  else {
    var wMon = new Date(sunBase); wMon.setDate(sunBase.getDate() + 1);
    var wSat = new Date(sunBase); wSat.setDate(sunBase.getDate() + 6);
    titleEl.textContent = (wMon.getMonth()+1) + "月" + wMon.getDate() + "日〜" + wSat.getDate() + "日";
  }
  document.getElementById("btn-next-week").disabled = (weekOffset >= 0);

  var c = document.getElementById("week-days");
  c.innerHTML = "";
  for (var i = 0; i < 7; i++) {
    var d = new Date(sunBase); d.setDate(sunBase.getDate() + i);
    var dw = d.getDay(), ds = dstr(d);
    var isToday = (weekOffset === 0 && i === td);
    var isFuture = (d > now && !isToday);
    var di = dowToDi(dw);
    var dotStyle = "", dotClass = "week-dot", txt = d.getDate(), clickable = false;

    if (di !== null) {
      var col = DAYS[di].color;
      var total = DAYS[di].exercises.reduce(function(a,e){ return a+e.sets; }, 0);
      var rec = recs.find(function(r){ return r.date === ds && r.dayIdx === di; });
      if (rec && rec.setsDone >= total) {
        dotStyle = "background:" + col + ";border-color:" + col + ";color:#000;font-weight:700;";
        txt = "✓";
      } else if (isToday) {
        dotStyle = "border-color:" + col + ";color:" + col + ";border-width:2px;font-weight:700;";
      } else if (isFuture) {
        dotStyle = "border-color:" + col + ";color:" + col + ";opacity:.35;";
      } else {
        dotStyle = "border-color:" + col + ";color:" + col + ";opacity:.6;";
        clickable = true;
      }
      if (!isFuture) clickable = true;
    } else {
      dotStyle = "opacity:.15;";
    }

    var dotEl = "<div class='" + dotClass + "' style='" + dotStyle + (clickable ? "cursor:pointer;" : "") + "'";
    if (clickable && di !== null) dotEl += " data-di='" + di + "' data-ds='" + ds + "'";
    dotEl += ">" + txt + "</div>";
    c.innerHTML += "<div class='week-day'><div class='week-day-label'>" + DOW_EN[i] + "</div>" + dotEl + "</div>";
  }

  c.querySelectorAll(".week-dot[data-di]").forEach(function(el) {
    el.addEventListener("click", function() {
      var di = parseInt(this.dataset.di), ds = this.dataset.ds;
      viewDayIdx = di;
      setDayColor(DAYS[di].color);
      var todayDi = dowToDi(new Date().getDay());
      renderDaySelector(weekOffset === 0 ? todayDi : null);
      // Render card for this specific date
      renderTodayCardForDate(di, ds, weekOffset === 0 ? todayDi : null);
    });
  });
}

function renderTodayCardForDate(di, targetDate, todayDi) {
  var day = DAYS[di];
  var total = day.exercises.reduce(function(a,e){ return a+e.sets; }, 0);
  var rec   = getRecs().find(function(r){ return r.date === targetDate && r.dayIdx === di; });
  var done  = rec ? rec.setsDone : 0;
  var pct   = total > 0 ? Math.round(done / total * 100) : 0;
  var isToday = (di === todayDi && weekOffset === 0);
  var d = new Date(targetDate + "T00:00:00");
  var topLabel = isToday ? "TODAY'S TRAINING"
    : (d.getMonth()+1) + "月" + d.getDate() + "日（" + DOW_JP[d.getDay()] + "）";
  var btnLabel = (rec && done >= total) ? "✓ 完了済み — 再確認" : (done > 0 ? "▶ 続きから" : "▶ トレーニング開始");

  var sec = document.getElementById("today-section");
  sec.innerHTML =
    "<div class='today-card'><div class='today-card-accent'></div><div class='today-card-inner'>" +
    "<div class='today-label'>" + topLabel + "</div>" +
    "<div class='today-day-en'>" + DAY_EN[di] + "</div>" +
    "<div class='today-part'>" + day.name + " <span style='font-weight:300;font-size:16px;color:var(--muted)'>" + day.eng + "</span></div>" +
    "<div class='today-sub'>" + day.exercises.length + "種目 · 約15分</div>" +
    "<div class='progress-label'><span>進捗</span><span>" + done + "/" + total + " セット</span></div>" +
    "<div class='progress-bg'><div class='progress-fill' style='width:" + pct + "%'></div></div>" +
    "<button class='start-btn' id='btn-start'>" + btnLabel + "</button>" +
    "</div></div>";

  document.getElementById("btn-start").addEventListener("click", function() {
    openWorkout(di, targetDate);
  });
}

// Week nav buttons
document.getElementById("btn-prev-week").addEventListener("click", function() {
  if (weekOffset > -8) {
    weekOffset--;
    viewDayIdx = 0;
    setDayColor(DAYS[0].color);
    var todayDi = dowToDi(new Date().getDay());
    renderDaySelector(weekOffset === 0 ? todayDi : null);
    renderTodayCard(viewDayIdx, weekOffset === 0 ? todayDi : null);
    renderWeekCal();
  }
});
document.getElementById("btn-next-week").addEventListener("click", function() {
  if (weekOffset < 0) {
    weekOffset++;
    viewDayIdx = weekOffset === 0 ? (dowToDi(new Date().getDay()) || 0) : 0;
    setDayColor(DAYS[viewDayIdx].color);
    var todayDi = dowToDi(new Date().getDay());
    renderDaySelector(weekOffset === 0 ? todayDi : null);
    renderTodayCard(viewDayIdx, weekOffset === 0 ? todayDi : null);
    renderWeekCal();
  }
});

// ===================== WORKOUT =====================
function openWorkout(di, targetDate) {
  curDayIdx   = di;
  workoutDate = targetDate || todayStr();
  setDayColor(DAYS[di].color);
  var saved = gs("wt_sess_" + workoutDate + "_" + di, null);
  if (saved) { setsDone = saved.s || {}; memos = saved.m || {}; }
  else        { setsDone = {}; memos = {}; }

  // If already fully done, enter review mode so COMPLETE banner doesn't fire immediately
  var day0 = DAYS[di];
  var tot0 = day0.exercises.reduce(function(a,e){ return a+e.sets; }, 0);
  var dn0  = day0.exercises.reduce(function(a,ex,ei){ return a+(setsDone[ei]||[]).filter(Boolean).length; }, 0);
  reviewMode = (dn0 >= tot0 && tot0 > 0);

  var isToday = (workoutDate === todayStr());
  document.getElementById("wh-part").textContent  = (isToday ? "TODAY · " : "") + DAY_EN[di];
  document.getElementById("wh-title").textContent = day0.name + "　" + day0.eng;
  updateProgress();
  renderExList();
  showScreen("workout");
  document.querySelector("#screen-workout .scroll-body").scrollTop = 0;
}

function updateProgress() {
  var day = DAYS[curDayIdx], total = 0, done = 0;
  day.exercises.forEach(function(ex, ei) {
    total += ex.sets;
    done  += (setsDone[ei] || []).filter(Boolean).length;
  });
  document.getElementById("wh-progress").textContent = done + " / " + total + " セット完了";
  var timerOpen = document.getElementById("timer-modal").classList.contains("show");
  if (!reviewMode && !timerOpen && done >= total && total > 0) { saveWorkoutRecord(); setTimeout(showFinish, 500); }
  if (reviewMode && done < total) { reviewMode = false; }

}

function renderExList() {
  var day = DAYS[curDayIdx];
  var c = document.getElementById("ex-list");
  c.innerHTML = "";
  day.exercises.forEach(function(ex, ei) {
    var sd   = setsDone[ei] || Array(ex.sets).fill(false);
    var memo = memos[ei] || "";
    var card = document.createElement("div");
    card.className = "ex-card";
    card.id = "exc-" + ei;

    var headHTML = "<div class='ex-head'>" +
      "<div class='ex-badge'>" + (ei+1) + "</div>" +
      "<div class='ex-info'><div class='ex-name'>" + ex.name + "</div>" +
      "<div class='ex-sets-lbl'>" + ex.sets + "セット × " + ex.reps + "　休憩" + ex.rest + "秒</div></div>" +
      "<span class='ex-chev'>+</span></div>";

    var howItems = ex.how.map(function(h){ return "<li>" + h + "</li>"; }).join("");
    var pointItems = ex.points.map(function(p){ return "<div class='point'>" + p + "</div>"; }).join("");

    var setsHTML = "<div class='sets-row' id='sr-" + ei + "'>";
    for (var s = 0; s < ex.sets; s++) {
      setsHTML += "<button class='set-btn" + (sd[s] ? " done" : "") + "' data-ei='" + ei + "' data-si='" + s + "'>" + (sd[s] ? "✓" : s+1) + "</button>";
    }
    setsHTML += "</div>";

    var gifHTML = ex.gif ? "<div class='ex-gif-wrap'><img class='ex-gif' src='" + ex.gif + "' loading='lazy' onerror='hideGif(this)'></div>" : "";
    var bodyHTML = "<div class='ex-body'><div class='ex-inner'>" +
      gifHTML +
      "<div class='sets-tracker'><div class='sets-title'>セット記録</div>" + setsHTML + "</div>" +
      "<div class='ex-sec'><div class='ex-sec-title'>やり方</div><ul class='ex-how'>" + howItems + "</ul></div>" +
      "<div class='ex-sec'><div class='ex-sec-title'>ポイント</div>" + pointItems + "</div>" +
      "<div class='ex-sec'><div class='ex-sec-title'>メモ</div>" +
      "<textarea class='memo-area' data-ei='" + ei + "' placeholder='今日の感想・調子など…'>" + memo + "</textarea></div>" +
      "</div></div>";

    card.innerHTML = headHTML + bodyHTML;
    c.appendChild(card);

    // Toggle open
    card.querySelector(".ex-head").addEventListener("click", function() {
      card.classList.toggle("open");
    });

    // Memo
    card.querySelector(".memo-area").addEventListener("change", function() {
      memos[parseInt(this.dataset.ei)] = this.value;
      saveSession();
    });
  });

  // Set buttons
  c.querySelectorAll(".set-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var ei = parseInt(this.dataset.ei), si = parseInt(this.dataset.si);
      var ex = DAYS[curDayIdx].exercises[ei];
      if (!setsDone[ei]) setsDone[ei] = Array(ex.sets).fill(false);
      setsDone[ei][si] = !setsDone[ei][si];
      this.classList.toggle("done", setsDone[ei][si]);
      this.textContent = setsDone[ei][si] ? "✓" : si + 1;
      saveSession();
      var doneCnt = (setsDone[ei] || []).filter(Boolean).length;
      if (setsDone[ei][si] && doneCnt < ex.sets) {
        timerSec = ex.rest; timerRemain = ex.rest; openTimerAuto();
      }
      updateProgress();
    });
  });
}

function saveSession() { ss("wt_sess_" + workoutDate + "_" + curDayIdx, { s: setsDone, m: memos }); }

function saveWorkoutRecord() {
  var day = DAYS[curDayIdx], total = 0, done = 0;
  day.exercises.forEach(function(ex, ei) {
    total += ex.sets;
    done  += (setsDone[ei] || []).filter(Boolean).length;
  });
  var memo = Object.values(memos).filter(Boolean).join(" / ");
  saveRec({ date: workoutDate, dayIdx: curDayIdx, setsTotal: total, setsDone: done, memo: memo });
}

function showFinish() {
  document.getElementById("finish-sub").innerHTML = DAYS[curDayIdx].name + "トレーニング完了！<br>お疲れ様でした 💪<br><br>水分補給とストレッチを忘れずに。";
  document.getElementById("finish-banner").classList.add("show");
}

document.getElementById("btn-finish").addEventListener("click", function() {
  document.getElementById("finish-banner").classList.remove("show");
  saveWorkoutRecord();
  viewDayIdx = curDayIdx;
  showScreen("home");
});

document.getElementById("btn-back").addEventListener("click", function() {
  saveWorkoutRecord();
  viewDayIdx = curDayIdx;
  showScreen("home");
});

// ===================== TIMER =====================
document.getElementById("btn-timer-fab").addEventListener("click", openTimer);
document.getElementById("btn-timer-close").addEventListener("click", closeTimer);
document.getElementById("btn-timer-toggle").addEventListener("click", toggleTimer);
document.querySelectorAll(".timer-preset").forEach(function(btn) {
  btn.addEventListener("click", function() {
    clearInterval(timerIv); timerRunning = false;
    timerSec = parseInt(this.dataset.sec); timerRemain = timerSec;
    updateTimerDisp();
    document.getElementById("btn-timer-toggle").textContent = "スタート";
    document.querySelectorAll(".timer-preset").forEach(function(b){ b.classList.remove("sel"); });
    this.classList.add("sel");
  });
});

function openTimer() {
  timerRemain = timerSec; updateTimerDisp();
  document.getElementById("timer-modal").classList.add("show");
  document.getElementById("btn-timer-toggle").textContent = "スタート";
  clearInterval(timerIv); timerRunning = false;
}
function openTimerAuto() {
  timerRemain = timerSec; updateTimerDisp();
  document.getElementById("timer-modal").classList.add("show");
  timerRunning = true;
  document.getElementById("btn-timer-toggle").textContent = "一時停止";
  clearInterval(timerIv); timerIv = setInterval(tickTimer, 1000);
}
function closeTimer() {
  clearInterval(timerIv); timerRunning = false;
  document.getElementById("timer-modal").classList.remove("show");
  // Check if workout is now complete (was blocked while timer was open)
  if (curDayIdx !== null) { updateProgress(); }
}
function toggleTimer() {
  if (timerRunning) { clearInterval(timerIv); timerRunning = false; document.getElementById("btn-timer-toggle").textContent = "スタート"; }
  else { timerRunning = true; document.getElementById("btn-timer-toggle").textContent = "一時停止"; timerIv = setInterval(tickTimer, 1000); }
}
function tickTimer() {
  timerRemain--;
  updateTimerDisp();
  if (timerRemain <= 0) { clearInterval(timerIv); timerRunning = false; timerRemain = timerSec; updateTimerDisp(); closeTimer(); }
}
function updateTimerDisp() {
  var m = Math.floor(timerRemain / 60), s = timerRemain % 60;
  document.getElementById("timer-disp").textContent = String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}

// ===================== RECORD =====================
function renderRecord() {
  var recs = getRecs(), c = document.getElementById("rec-list");
  if (!recs.length) { c.innerHTML = "<div class='empty-state'>📋<br><br>まだ記録がありません。<br>トレーニングを完了すると<br>ここに記録が残ります。</div>"; return; }
  var groups = {};
  recs.forEach(function(r) { var m = r.date.slice(0,7); if (!groups[m]) groups[m] = []; groups[m].push(r); });
  var html = "";
  Object.keys(groups).sort().reverse().forEach(function(m) {
    var parts = m.split("-");
    html += "<div class='rec-month'>" + parts[0] + "年" + parseInt(parts[1]) + "月</div>";
    groups[m].forEach(function(r) {
      var day = DAYS[r.dayIdx], d = new Date(r.date + "T00:00:00");
      html += "<div class='rec-item'><div class='rec-dot' style='background:" + day.color + "'></div>" +
        "<div class='rec-info'><div class='rec-date'>" + (d.getMonth()+1) + "/" + d.getDate() + "（" + DOW_JP[d.getDay()] + "）　" + day.name + "</div>" +
        "<div class='rec-memo'>" + (r.memo || "—") + "</div></div>" +
        "<div class='rec-sets' style='color:" + day.color + "'>" + r.setsDone + "/" + r.setsTotal + "</div></div>";
    });
  });
  c.innerHTML = html;
}

// ===================== MENU =====================
function renderMenuScreen() {
  var wdays = ["月曜日","火曜日","水曜日","木曜日","金曜日","土曜日"];
  var c = document.getElementById("menu-body");
  c.innerHTML = "";
  DAYS.forEach(function(day, di) {
    var card = document.createElement("div");
    card.className = "menu-card";
    var exHTML = day.exercises.map(function(ex) {
      return "<div class='menu-ex'><div class='menu-ex-name'>" + ex.name + "</div>" +
        "<div class='menu-ex-sets'>" + ex.sets + "セット × " + ex.reps + "　休憩" + ex.rest + "秒</div>" +
        "<ul class='menu-how'>" + ex.how.map(function(h){ return "<li>" + h + "</li>"; }).join("") + "</ul>" +
        ex.points.map(function(p){ return "<div class='menu-point' style='border-color:" + day.color + ";background:color-mix(in srgb," + day.color + " 8%,transparent)'>" + p + "</div>"; }).join("") +
        "</div>";
    }).join("");
    card.innerHTML =
      "<div class='menu-card-head'>" +
      "<div class='menu-bar' style='background:" + day.color + "'></div>" +
      "<div><div class='menu-card-name' style='color:" + day.color + "'>" + wdays[di] + "　" + day.name + "</div>" +
      "<div class='menu-card-sub'>" + day.exercises.length + "種目 · 約15分</div></div>" +
      "<span class='menu-chev'>▾</span></div>" +
      "<div class='menu-ex-list'>" + exHTML + "</div>";
    card.querySelector(".menu-card-head").addEventListener("click", function() { card.classList.toggle("open"); });
    c.appendChild(card);
  });
}

// ===================== INIT =====================
function hideGif(img){ try{ img.parentElement.style.display="none"; }catch(e){} }
renderHome();
</script>
