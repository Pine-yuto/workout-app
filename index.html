<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>週6筋トレ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#111;--card:#161616;--border:#222;--text:#f0f0f0;--muted:#555;--day-color:#e85d04;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans JP",sans-serif;font-weight:300;display:flex;flex-direction:column;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.bottom-nav{display:flex;background:#0d0d0d;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;cursor:pointer;color:var(--muted);font-size:10px;letter-spacing:1px;transition:color .2s;}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;}
.nav-item.active{color:var(--day-color);}
/* HOME */
.home-header{padding:20px 20px 0;}
.home-date{font-size:11px;letter-spacing:2px;color:var(--muted);}
.home-greeting{font-family:"Bebas Neue",sans-serif;font-size:36px;letter-spacing:1px;margin-top:4px;line-height:1.1;}
.selector-label{font-size:9px;letter-spacing:3px;color:var(--muted);margin:14px 20px 8px;}
.day-selector{display:flex;gap:6px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none;}
.day-selector::-webkit-scrollbar{display:none;}
.day-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:"Noto Sans JP",sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;color:var(--muted);}
.day-btn.is-today{border-color:var(--dc)!important;color:var(--dc)!important;}
.day-btn.is-active{background:var(--dc);border-color:var(--dc);color:#000;font-weight:700;}
.today-card{margin:12px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative;}
.today-card-accent{position:absolute;top:0;left:0;right:0;height:3px;background:var(--day-color);}
.today-card-inner{padding:20px;}
.today-label{font-size:10px;letter-spacing:3px;color:var(--muted);}
.today-day{font-family:"Bebas Neue",sans-serif;font-size:48px;line-height:1;color:var(--day-color);margin:4px 0;}
.today-part{font-size:22px;font-weight:700;letter-spacing:1px;}
.today-sub{font-size:12px;color:var(--muted);margin-top:6px;}
.today-progress-wrap{margin-top:16px;}
.today-progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;}
.progress-bar-bg{background:var(--border);border-radius:4px;height:6px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--day-color);border-radius:4px;transition:width .4s ease;}
.start-btn{display:block;width:100%;margin-top:16px;padding:14px;background:var(--day-color);color:#000;font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;border:none;border-radius:8px;cursor:pointer;text-align:center;}
.rest-card{margin:12px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px 20px;text-align:center;}
.rest-icon{font-size:36px;margin-bottom:10px;}
.rest-title{font-family:"Bebas Neue",sans-serif;font-size:26px;letter-spacing:1px;color:var(--muted);}
.rest-sub{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.8;}
.streak-row{display:flex;gap:10px;margin:12px 20px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;align-items:center;}
.streak-icon{font-size:28px;}
.streak-text{flex:1;}
.streak-num{font-family:"Bebas Neue",sans-serif;font-size:32px;line-height:1;color:#ffbe0b;}
.streak-label{font-size:11px;color:var(--muted);letter-spacing:1px;}
.week-cal{margin:0 20px 20px;}
.week-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.week-cal-title{font-size:10px;letter-spacing:2px;color:var(--muted);flex:1;text-align:center;}
.week-nav-btn{background:none;border:1px solid var(--border);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);flex-shrink:0;}
.week-nav-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.week-nav-btn:disabled{opacity:.2;cursor:default;}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.week-day{display:flex;flex-direction:column;align-items:center;gap:4px;}
.week-day-label{font-size:9px;color:var(--muted);}
.week-day-dot{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);}
/* WORKOUT */
.workout-header{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;}
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;}
.back-btn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;}
.workout-header-info{flex:1;}
.workout-header-part{font-size:11px;letter-spacing:2px;color:var(--day-color);}
.workout-header-title{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:1px;line-height:1;}
.workout-header-progress{font-size:11px;color:var(--muted);margin-top:2px;}
.ex-list{padding:12px 16px 100px;}
.ex-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--day-color);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.ex-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.ex-num-badge{width:28px;height:28px;border-radius:50%;background:color-mix(in srgb,var(--day-color) 15%,transparent);color:var(--day-color);font-family:"Bebas Neue",sans-serif;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:700;}
.ex-sets-label{font-size:11px;color:var(--muted);margin-top:2px;}
.ex-chevron{color:var(--muted);transition:transform .25s;font-size:18px;flex-shrink:0;}
.ex-card.open .ex-chevron{transform:rotate(45deg);}
.ex-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.ex-card.open .ex-body{max-height:900px;}
.ex-inner{padding:0 16px 16px;border-top:1px solid var(--border);}
.ex-section{margin-top:12px;}
.ex-section-title{font-size:9px;letter-spacing:3px;color:var(--day-color);font-weight:700;margin-bottom:8px;}
.ex-how{list-style:none;}
.ex-how li{font-size:12px;line-height:1.8;color:#bbb;padding-left:14px;position:relative;margin-bottom:2px;}
.ex-how li::before{content:"--";position:absolute;left:0;color:var(--day-color);font-size:9px;top:4px;}
.point-item{background:color-mix(in srgb,var(--day-color) 8%,transparent);border-left:2px solid var(--day-color);padding:7px 10px;font-size:11px;line-height:1.6;color:#bbb;border-radius:0 4px 4px 0;margin-bottom:5px;}
.sets-tracker{margin-top:14px;}
.sets-tracker-title{font-size:9px;letter-spacing:3px;color:var(--day-color);font-weight:700;margin-bottom:8px;}
.sets-row{display:flex;gap:8px;flex-wrap:wrap;}
.set-btn{width:44px;height:44px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:"Bebas Neue",sans-serif;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.set-btn.done{background:var(--day-color);border-color:var(--day-color);color:#000;font-size:16px;}
.memo-area{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:"Noto Sans JP",sans-serif;font-size:12px;padding:10px;resize:none;height:64px;margin-top:8px;}
.memo-area::placeholder{color:var(--muted);}
.timer-fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--day-color);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px color-mix(in srgb,var(--day-color) 40%,transparent);z-index:50;transition:transform .2s;}
.timer-fab:active{transform:scale(.9);}
.timer-fab svg{width:22px;height:22px;stroke:#000;fill:none;stroke-width:2;}
.timer-modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;}
.timer-modal.show{display:flex;}
.timer-display{font-family:"Bebas Neue",sans-serif;font-size:96px;color:var(--day-color);line-height:1;text-align:center;}
.timer-label{font-size:12px;letter-spacing:3px;color:var(--muted);text-align:center;margin-bottom:32px;}
.timer-btns{display:flex;gap:12px;margin-top:24px;}
.timer-btn{padding:12px 28px;border-radius:8px;border:none;font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
.timer-btn.primary{background:var(--day-color);color:#000;}
.timer-btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.timer-presets{display:flex;gap:8px;margin-top:20px;}
.timer-preset{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;}
.timer-preset.sel{border-color:var(--day-color);color:var(--day-color);}
.finish-banner{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px;}
.finish-banner.show{display:flex;}
.finish-emoji{font-size:64px;margin-bottom:16px;}
.finish-title{font-family:"Bebas Neue",sans-serif;font-size:48px;color:var(--day-color);letter-spacing:2px;}
.finish-sub{font-size:14px;color:var(--muted);margin-top:8px;margin-bottom:32px;line-height:1.8;}
.finish-btn{padding:14px 40px;background:var(--day-color);color:#000;border:none;border-radius:8px;font-weight:700;font-size:14px;letter-spacing:2px;cursor:pointer;}
.record-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.record-title{font-family:"Bebas Neue",sans-serif;font-size:32px;letter-spacing:1px;}
.record-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.record-list{padding:16px 20px 100px;}
.record-month-label{font-size:10px;letter-spacing:2px;color:var(--muted);margin:16px 0 8px;}
.record-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.record-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.record-info{flex:1;}
.record-date{font-size:13px;font-weight:700;}
.record-detail{font-size:11px;color:var(--muted);margin-top:2px;}
.record-sets{font-family:"Bebas Neue",sans-serif;font-size:20px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:13px;line-height:1.8;}
.menu-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.menu-title{font-family:"Bebas Neue",sans-serif;font-size:32px;letter-spacing:1px;}
.menu-body{padding:16px 20px 100px;}
.menu-day-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;}
.menu-day-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.menu-day-bar{width:4px;height:40px;border-radius:2px;flex-shrink:0;}
.menu-day-info{flex:1;}
.menu-day-name{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:1px;}
.menu-day-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.menu-chevron{color:var(--muted);transition:transform .25s;}
.menu-day-card.open .menu-chevron{transform:rotate(180deg);}
.menu-ex-list{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.menu-day-card.open .menu-ex-list{max-height:3000px;}
.menu-ex-item{padding:12px 16px;border-top:1px solid var(--border);}
.menu-ex-name{font-size:13px;font-weight:700;}
.menu-ex-sets{font-size:11px;color:var(--muted);margin-top:2px;}
.menu-ex-how{list-style:none;margin-top:8px;}
.menu-ex-how li{font-size:11px;color:#aaa;line-height:1.8;padding-left:12px;position:relative;}
.menu-ex-how li::before{content:"-";position:absolute;left:0;}
.menu-point{padding:6px 10px;font-size:11px;color:#aaa;line-height:1.6;border-radius:0 3px 3px 0;margin-top:4px;border-left:2px solid;}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="scroll-body">
    <div class="home-header">
      <div class="home-date" id="home-date"></div>
      <div class="home-greeting" id="home-greeting"></div>
    </div>
    <div class="selector-label">曜日を選んでスタート</div>
    <div class="day-selector" id="day-selector"></div>
    <div id="today-section"></div>
    <div class="streak-row">
      <div class="streak-icon">&#x1F525;</div>
      <div class="streak-text">
        <div class="streak-num" id="streak-num">0</div>
        <div class="streak-label">DAY STREAK</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--muted)">今週の完了</div>
        <div id="week-done-count" style="font-family:Bebas Neue,sans-serif;font-size:28px">0/6</div>
      </div>
    </div>
    <div class="week-cal">
      <div class="week-cal-header">
        <button class="week-nav-btn" onclick="shiftWeek(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="week-cal-title" id="week-cal-title">今週のトレーニング</div>
        <button class="week-nav-btn" id="week-nav-next" onclick="shiftWeek(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <div class="week-days" id="week-days"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="showScreen('home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>ホーム</div>
    <div class="nav-item" onclick="showScreen('record')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>記録</div>
    <div class="nav-item" onclick="showScreen('menu')"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>メニュー</div>
  </nav>
</div>

<!-- WORKOUT -->
<div class="screen" id="screen-workout">
  <div class="workout-header">
    <button class="back-btn" onclick="closeWorkout()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="workout-header-info">
      <div class="workout-header-part" id="wh-part"></div>
      <div class="workout-header-title" id="wh-title"></div>
      <div class="workout-header-progress" id="wh-progress"></div>
    </div>
  </div>
  <div class="scroll-body ex-list" id="ex-list"></div>
  <button class="timer-fab" onclick="openTimer()"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 15 16"/><path d="M9 2h6"/></svg></button>
</div>

<!-- RECORD -->
<div class="screen" id="screen-record">
  <div class="record-header"><div class="record-title">TRAINING LOG</div><div class="record-sub">トレーニング記録</div></div>
  <div class="scroll-body record-list" id="record-list"></div>
  <nav class="bottom-nav">
    <div class="nav-item" onclick="showScreen('home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>ホーム</div>
    <div class="nav-item active" onclick="showScreen('record')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>記録</div>
    <div class="nav-item" onclick="showScreen('menu')"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>メニュー</div>
  </nav>
</div>

<!-- MENU -->
<div class="screen" id="screen-menu">
  <div class="menu-header"><div class="menu-title">WEEKLY MENU</div></div>
  <div class="scroll-body menu-body" id="menu-body"></div>
  <nav class="bottom-nav">
    <div class="nav-item" onclick="showScreen('home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>ホーム</div>
    <div class="nav-item" onclick="showScreen('record')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>記録</div>
    <div class="nav-item active" onclick="showScreen('menu')"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>メニュー</div>
  </nav>
</div>

<!-- TIMER -->
<div class="timer-modal" id="timer-modal">
  <div class="timer-label">REST TIMER</div>
  <div class="timer-display" id="timer-display">01:00</div>
  <div class="timer-presets">
    <button class="timer-preset" onclick="setTimerSec(30,this)">30秒</button>
    <button class="timer-preset sel" onclick="setTimerSec(60,this)">60秒</button>
    <button class="timer-preset" onclick="setTimerSec(90,this)">90秒</button>
  </div>
  <div class="timer-btns">
    <button class="timer-btn secondary" onclick="closeTimer()">閉じる</button>
    <button class="timer-btn primary" id="timer-toggle-btn" onclick="toggleTimer()">スタート</button>
  </div>
</div>

<!-- FINISH -->
<div class="finish-banner" id="finish-banner">
  <div class="finish-emoji">&#x1F4AA;</div>
  <div class="finish-title">COMPLETE!</div>
  <div class="finish-sub" id="finish-sub"></div>
  <button class="finish-btn" onclick="closeFinish()">ホームへ戻る</button>
</div>

<script>
const DAYS=[
  {name:"胸",eng:"CHEST",color:"#e85d04",dow:1,exercises:[
    {name:"ダンベルフライ",sets:3,reps:"10〜12回",rest:60,
     how:["床またはベッドに仰向けになり、ダンベルを両手に持つ","肘を軽く曲げた状態で、腕を横に大きく開いていく","胸がしっかり伸びたところで止め、胸を絞るように腕を閉じて戻す","動作中、肘の角度は変えない（固定したまま）"],

const DOW=["日","月","火","水","木","金","土"];

const DAY_ENG=["MON","TUE","WED","THU","FRI","SAT"];
// dow 1-6 -> dayIdx 0-5; 0(sun)=null
function dowToDi(dw){return(dw>=1&&dw<=6)?dw-1:null;}

let curDayIdx=null,viewDayIdx=null,workoutDate=null,weekOffset=0;
let setsDone={},memos={};
let timerSec=60,timerRemain=60,timerRunning=false,timerIv=null;

function gs(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function dstr(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayStr(){return dstr(new Date());}
function getRecs(){return gs("wt_recs",[]);}
function saveRec(r){const recs=getRecs();const i=recs.findIndex(x=>x.date===r.date&&x.dayIdx===r.dayIdx);if(i>=0)recs[i]=r;else recs.unshift(r);ss("wt_recs",recs);}

function showScreen(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+n).classList.add("active");
  if(n==="home")renderHome();
  if(n==="record")renderRecord();
  if(n==="menu")renderMenuScreen();
}

function renderHome(){
  const now=new Date();const dow=now.getDay();
  document.getElementById("home-date").textContent=now.getFullYear()+"年"+(now.getMonth()+1)+"月"+now.getDate()+"日（"+DOW[dow]+"）";
  const h=now.getHours();
  document.getElementById("home-greeting").textContent=h<12?"おはようございます":h<17?"こんにちは":"おつかれさまです";
  const todayDi=dowToDi(dow);
  curDayIdx=todayDi;
  if(viewDayIdx===null)viewDayIdx=todayDi!==null?todayDi:0;
  renderDaySelector(weekOffset===0?todayDi:null);
  renderTodayCard(viewDayIdx,weekOffset===0?todayDi:null);
  renderStreak();
  renderWeekCal();
}

function renderDaySelector(todayDi){
  const labels=["月（胸）","火（背中）","水（肩）","木（腕）","金（下半身）","土（腹筋）"];
  document.getElementById("day-selector").innerHTML=DAYS.map((day,i)=>{
    const isToday=i===todayDi;
    const isActive=i===viewDayIdx;
    const dc=day.color;
    let cls="day-btn";
    if(isActive)cls+=" is-active";
    else if(isToday)cls+=" is-today";
    const style=isActive?("--dc:"+dc+";background:"+dc+";border-color:"+dc+";color:#000;font-weight:700;")
                :isToday?("--dc:"+dc+";border-color:"+dc+";color:"+dc+";")
                :("--dc:"+dc+";");
    return "<button class='"+cls+"' style='"+style+"' onclick='selectDay("+i+")'>"+(isToday?"★ ":"")+labels[i]+"</button>";
  }).join("");
}

function selectDay(di){
  viewDayIdx=di;
  const todayDi=weekOffset===0?dowToDi(new Date().getDay()):null;
  document.documentElement.style.setProperty("--day-color",DAYS[di].color);
  renderDaySelector(todayDi);
  renderTodayCard(di,todayDi);
}

function getDateForDayIdx(di){
  // Return the selected week's date for that dayIdx
  const now=new Date();
  const thisDow=now.getDay();
  // Start of selected week (Sunday)
  const weekSun=new Date(now);weekSun.setDate(now.getDate()-thisDow+weekOffset*7);
  const targetDow=di+1; // dayIdx 0=Mon(dow1)...5=Sat(dow6)
  const d=new Date(weekSun);d.setDate(weekSun.getDate()+targetDow);
  return dstr(d);
}

function renderStreak(){
  const recs=getRecs();let streak=0;const now=new Date();
  for(let i=0;i<90;i++){
    const d=new Date(now);d.setDate(now.getDate()-i);
    const dw=d.getDay();if(dw===0)continue;
    const ds=dstr(d);const di=dw-1;
    const total=DAYS[di].exercises.reduce((a,e)=>a+e.sets,0);
    const rec=recs.find(r=>r.date===ds&&r.dayIdx===di);
    if(rec&&rec.setsDone>=total)streak++;else if(i>0)break;
  }
  document.getElementById("streak-num").textContent=streak;
  const ws=new Date(now);ws.setDate(now.getDate()-now.getDay()+1);
  let wd=0;
  for(let i=0;i<6;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);
    const ds=dstr(d);const total=DAYS[i].exercises.reduce((a,e)=>a+e.sets,0);
    const rec=getRecs().find(r=>r.date===ds&&r.dayIdx===i);
    if(rec&&rec.setsDone>=total)wd++;
  }
  document.getElementById("week-done-count").textContent=wd+"/6";
}

function shiftWeek(dir){
  const newOffset=weekOffset+dir;
  if(newOffset>0)return; // can't go future
  if(newOffset<-8)return; // max ~2 months back
  weekOffset=newOffset;
  viewDayIdx=null; // reset selected day when changing week
  renderWeekCal();
  // Update day selector and card for new week context
  const now=new Date();const todayDi=dowToDi(now.getDay());
  // If current week, default to today's day; else default to Mon
  viewDayIdx=weekOffset===0&&todayDi!==null?todayDi:0;
  renderDaySelector(weekOffset===0?todayDi:null);
  renderTodayCard(viewDayIdx,weekOffset===0?todayDi:null);
}

function renderWeekCal(){
  const recs=getRecs();const now=new Date();const td=now.getDay();
  // Base = this week's Sunday, shifted by weekOffset weeks
  const ws=new Date(now);ws.setDate(now.getDate()-td+weekOffset*7);
  const c=document.getElementById("week-days");c.innerHTML="";
  // Update title
  const wMon=new Date(ws);wMon.setDate(ws.getDate()+1);
  const wSat=new Date(ws);wSat.setDate(ws.getDate()+6);
  const titleEl=document.getElementById("week-cal-title");
  if(weekOffset===0){titleEl.textContent="今週のトレーニング";}
  else if(weekOffset===-1){titleEl.textContent="先週のトレーニング";}
  else{titleEl.textContent=(wMon.getMonth()+1)+"月"+wMon.getDate()+"日 〜 "+wSat.getDate()+"日";}
  // Disable next button if current week
  const nextBtn=document.getElementById("week-nav-next");
  if(nextBtn)nextBtn.disabled=weekOffset>=0;
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const dw=d.getDay();const ds=dstr(d);
    const isToday=weekOffset===0&&i===td;
    const di=dowToDi(dw);
    let style="",txt=d.getDate(),cls="";
    const isFuture=d>now&&!isToday;
    if(di!==null){
      const col=DAYS[di].color;const total=DAYS[di].exercises.reduce((a,e)=>a+e.sets,0);
      const rec=recs.find(r=>r.date===ds&&r.dayIdx===di);
      if(rec&&rec.setsDone>=total){cls="done";style="background:"+col+";border-color:"+col+";color:#000;font-weight:700;";txt="✓";}
      else if(isToday){style="border-color:"+col+";color:"+col+";font-weight:700;border-width:2px;";}
      else if(isFuture){style="border-color:"+col+";color:"+col+";opacity:.35;";}
      else{style="border-color:"+col+";color:"+col+";opacity:.55;";}
    }else{style="opacity:.18";}
    // Clickable days (Mon-Sat, not future)
    const clickable=di!==null&&!isFuture;
    const clickAttr=clickable?"onclick='selectWeekDay("+di+",""+ds+"")' style='cursor:pointer;"+style+"'":"style='"+style+"'";
    c.innerHTML+="<div class='week-day'><div class='week-day-label'>"+DOW_EN[i]+"</div><div class='week-day-dot "+cls+"' "+clickAttr+">"+txt+"</div></div>";
  }
}

function selectWeekDay(di,dateStr){
  viewDayIdx=di;
  const todayDi=weekOffset===0?dowToDi(new Date().getDay()):null;
  document.documentElement.style.setProperty("--day-color",DAYS[di].color);
  renderDaySelector(todayDi);
  renderTodayCardForDate(di,dateStr,todayDi);
}

function openWorkout(di,targetDate){
  curDayIdx=di;workoutDate=targetDate||todayStr();
  document.documentElement.style.setProperty("--day-color",DAYS[di].color);
  const saved=gs("wt_sess_"+workoutDate+"_"+di,null);
  if(saved){setsDone=saved.s||{};memos=saved.m||{};}else{setsDone={};memos={};}
  const day=DAYS[di];const isToday=workoutDate===todayStr();
  document.getElementById("wh-part").textContent=(isToday?"TODAY · ":"")+DAY_ENG[di];
  document.getElementById("wh-title").textContent=day.name+"　"+day.eng;
  updateProgress();renderExList();
  showScreen("workout");
  document.querySelector("#screen-workout .scroll-body").scrollTop=0;
}

function updateProgress(){
  const day=DAYS[curDayIdx];let total=0,done=0;
  day.exercises.forEach((ex,ei)=>{total+=ex.sets;done+=(setsDone[ei]||[]).filter(Boolean).length;});
  document.getElementById("wh-progress").textContent=done+" / "+total+" セット完了";
  if(done>=total&&total>0){saveWorkoutRecord();setTimeout(showFinish,500);}
}

function renderExList(){
  const day=DAYS[curDayIdx];const c=document.getElementById("ex-list");c.innerHTML="";
  day.exercises.forEach((ex,ei)=>{
    const sd=setsDone[ei]||Array(ex.sets).fill(false);const memo=memos[ei]||"";
    let btns="";
    for(let s=0;s<ex.sets;s++)btns+="<button class='set-btn"+(sd[s]?" done":"")+"' onclick='toggleSet("+ei+","+s+")'>"+(sd[s]?"✓":s+1)+"</button>";
    c.innerHTML+="<div class='ex-card' id='exc-"+ei+"'>"+
      "<div class='ex-head' onclick='this.closest(\".ex-card\").classList.toggle(\"open\")'>"+
      "<div class='ex-num-badge'>"+(ei+1)+"</div>"+
      "<div class='ex-info'><div class='ex-name'>"+ex.name+"</div><div class='ex-sets-label'>"+ex.sets+"セット × "+ex.reps+"&nbsp;&nbsp;休憩"+ex.rest+"秒</div></div>"+
      "<span class='ex-chevron'>+</span></div>"+
      "<div class='ex-body'><div class='ex-inner'>"+
      "<div class='sets-tracker'><div class='sets-tracker-title'>セット記録</div><div class='sets-row' id='sr-"+ei+"'>"+btns+"</div></div>"+
      "<div class='ex-section'><div class='ex-section-title'>やり方</div><ul class='ex-how'>"+ex.how.map(h=>"<li>"+h+"</li>").join("")+"</ul></div>"+
      "<div class='ex-section'><div class='ex-section-title'>ポイント</div>"+ex.points.map(p=>"<div class='point-item'>"+p+"</div>").join("")+"</div>"+
      "<div class='ex-section'><div class='ex-section-title'>メモ</div><textarea class='memo-area' placeholder='今日の感想・調子など…' onchange='saveMemo("+ei+",this.value)'>"+memo+"</textarea></div>"+
      "</div></div></div>";
  });
}

function toggleSet(ei,si){
  const ex=DAYS[curDayIdx].exercises[ei];
  if(!setsDone[ei])setsDone[ei]=Array(ex.sets).fill(false);
  setsDone[ei][si]=!setsDone[ei][si];saveSession();
  const btn=document.getElementById("sr-"+ei).children[si];
  btn.classList.toggle("done",setsDone[ei][si]);btn.textContent=setsDone[ei][si]?"✓":si+1;
  updateProgress();
  const done=(setsDone[ei]||[]).filter(Boolean).length;
  if(setsDone[ei][si]&&done<ex.sets){timerSec=ex.rest;timerRemain=ex.rest;openTimerAuto();}
}
function saveMemo(ei,v){memos[ei]=v;saveSession();}
function saveSession(){ss("wt_sess_"+workoutDate+"_"+curDayIdx,{s:setsDone,m:memos});}
function saveWorkoutRecord(){
  const day=DAYS[curDayIdx];let total=0,done=0;
  day.exercises.forEach((ex,ei)=>{total+=ex.sets;done+=(setsDone[ei]||[]).filter(Boolean).length;});
  const memo=Object.values(memos).filter(Boolean).join(" / ");
  saveRec({date:workoutDate,dayIdx:curDayIdx,setsTotal:total,setsDone:done,memo});
}
function showFinish(){
  document.getElementById("finish-sub").innerHTML=DAYS[curDayIdx].name+"トレーニング完了！<br>お疲れ様でした！<br><br>水分補給とストレッチを忘れずに。";
  document.getElementById("finish-banner").classList.add("show");
}
function closeFinish(){document.getElementById("finish-banner").classList.remove("show");closeWorkout();}
function closeWorkout(){saveWorkoutRecord();viewDayIdx=curDayIdx;showScreen("home");}

function openTimer(){timerRemain=timerSec;updateTimerDisp();document.getElementById("timer-modal").classList.add("show");document.getElementById("timer-toggle-btn").textContent="スタート";timerRunning=false;clearInterval(timerIv);}
function openTimerAuto(){timerRemain=timerSec;updateTimerDisp();document.getElementById("timer-modal").classList.add("show");timerRunning=true;document.getElementById("timer-toggle-btn").textContent="一時停止";clearInterval(timerIv);timerIv=setInterval(tickTimer,1000);}
function closeTimer(){clearInterval(timerIv);timerRunning=false;document.getElementById("timer-modal").classList.remove("show");}
function setTimerSec(s,btn){clearInterval(timerIv);timerRunning=false;timerSec=s;timerRemain=s;updateTimerDisp();document.getElementById("timer-toggle-btn").textContent="スタート";document.querySelectorAll(".timer-preset").forEach(b=>b.classList.remove("sel"));btn.classList.add("sel");}
function toggleTimer(){if(timerRunning){clearInterval(timerIv);timerRunning=false;document.getElementById("timer-toggle-btn").textContent="スタート";}else{timerRunning=true;document.getElementById("timer-toggle-btn").textContent="一時停止";timerIv=setInterval(tickTimer,1000);}}
function tickTimer(){timerRemain--;updateTimerDisp();if(timerRemain<=0){clearInterval(timerIv);timerRunning=false;timerRemain=timerSec;updateTimerDisp();closeTimer();}}
function updateTimerDisp(){const m=Math.floor(timerRemain/60),s=timerRemain%60;document.getElementById("timer-display").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}

function renderRecord(){
  const recs=getRecs();const c=document.getElementById("record-list");
  if(!recs.length){c.innerHTML="<div class='empty-state'><div class='empty-icon'>📋</div><div class='empty-text'>まだ記録がありません。<br>トレーニングを完了すると<br>ここに記録が残ります。</div></div>";return;}
  const groups={};
  recs.forEach(r=>{const m=r.date.slice(0,7);if(!groups[m])groups[m]=[];groups[m].push(r);});
  let html="";
  Object.keys(groups).sort().reverse().forEach(m=>{
    const parts=m.split("-");html+="<div class='record-month-label'>"+parts[0]+"年"+parseInt(parts[1])+"月</div>";
    groups[m].forEach(r=>{
      const day=DAYS[r.dayIdx];const d=new Date(r.date+"T00:00:00");
      html+="<div class='record-item'><div class='record-dot' style='background:"+day.color+"'></div>"+
        "<div class='record-info'><div class='record-date'>"+(d.getMonth()+1)+"/"+d.getDate()+"（"+DOW[d.getDay()]+"）　"+day.name+"</div>"+
        "<div class='record-detail'>"+(r.memo||"—")+"</div></div>"+
        "<div class='record-sets' style='color:"+day.color+"'>"+r.setsDone+"/"+r.setsTotal+"</div></div>";
    });
  });
  c.innerHTML=html;
}

function renderMenuScreen(){
  const wdays=["月曜日","火曜日","水曜日","木曜日","金曜日","土曜日"];
  document.getElementById("menu-body").innerHTML=DAYS.map((day,di)=>
    "<div class='menu-day-card'>"+
    "<div class='menu-day-header' onclick='toggleMenu(this)'>"+
    "<div class='menu-day-bar' style='background:"+day.color+"'></div>"+
    "<div class='menu-day-info'><div class='menu-day-name' style='color:"+day.color+"'>"+wdays[di]+"　"+day.name+"</div>"+
    "<div class='menu-day-sub'>"+day.exercises.length+"種目 · 約15分</div></div>"+
    "<span class='menu-chevron'>▾</span></div>"+
    "<div class='menu-ex-list'>"+
    day.exercises.map(ex=>
      "<div class='menu-ex-item'>"+
      "<div class='menu-ex-name'>"+ex.name+"</div>"+
      "<div class='menu-ex-sets'>"+ex.sets+"セット × "+ex.reps+"　休憩"+ex.rest+"秒</div>"+
      "<ul class='menu-ex-how'>"+ex.how.map(h=>"<li>"+h+"</li>").join("")+"</ul>"+
      ex.points.map(p=>"<div class='menu-point' style='border-color:"+day.color+";background:color-mix(in srgb,"+day.color+" 8%,transparent)'>"+p+"</div>").join("")+
      "</div>"
    ).join("")+
    "</div></div>"
  ).join("");
}

function toggleMenu(el){el.closest(".menu-day-card").classList.toggle("open");}

renderHome();
</script>
